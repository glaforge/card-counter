<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyjo Card Counter</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1A1A2E" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.12.0/cdn/themes/light.css"
    />
    <link href="/css/styles.css" rel="stylesheet" />
    
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
            })
            .catch(error => {
              console.log('ServiceWorker registration failed: ', error);
            });
        });
      }
    </script>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.12.0/cdn/shoelace-autoloader.js"
    ></script>
    <script src="/js/app.js"></script>
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
  </head>
  <body>
    <div class="app-container">
      <header>
        <h1>Skyjo Counter</h1>
        <p>Instantly calculate your Skyjo points from a photo!</p>
      </header>
      
      <form action="/upload" method="post" enctype="multipart/form-data" id="upload-form">
        <input
          id="image-picker"
          type="file"
          name="picture"
          accept="image/*"
          capture="environment"
          onchange="newFileSelection(event)"
        />
        
        <div class="preview-container">
          <img id="image-preview" />
        </div>

        <sl-button
          id="picker-button"
          variant="primary"
          size="large"
          onclick="clickPicker(event)"
        >
          <sl-icon slot="prefix" name="camera"></sl-icon>
          Take a Picture
        </sl-button>
      </form>

      <div id="cards"></div>
      
      <div class="total-container" id="total-container" style="display: none;">
        <h2><span id="total">0</span> <span class="points-label">points</span></h2>
      </div>
    </div>
  </body>
</html>
